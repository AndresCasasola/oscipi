name: Pico OS CI

on:
  push:
    branches: [ main, release ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    name: Unit Tests & Firmware Compilation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Force Submodule Update
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive --force

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi cmake ninja-build gcc

      - name: Run Unit Tests
        shell: pwsh
        run: ./scripts/run_tests.ps1

      - name: List files for debugging
        run: |
          ls -ld lib/pico-sdk
          ls lib/pico-sdk/pico_sdk_init.cmake

      - name: Build Firmware (.uf2)
        shell: pwsh
        run: ./scripts/build_firmware.ps1 -Clean